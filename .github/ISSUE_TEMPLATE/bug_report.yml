name: Bug Report
description: Report a bug in a PasteFox extension
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: extension
    attributes:
      label: Extension
      description: Which extension is affected?
      options:
        - VS Code / Kiro
        - Chrome
        - Firefox
        - IntelliJ / JetBrains
        - CLI
        - GitHub Action
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: "e.g. 1.1.1"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform & OS
      placeholder: "e.g. VS Code 1.96 on Windows 11 / Chrome 131 on macOS"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs (optional)
      description: Paste any error messages or console output.
      render: shell
