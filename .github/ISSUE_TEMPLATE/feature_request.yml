name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: extension
    attributes:
      label: Extension
      description: Which extension is this for?
      options:
        - VS Code / Kiro
        - Chrome
        - IntelliJ / JetBrains
        - CLI
        - All extensions
        - New extension (specify below)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this useful? How would you use it?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternatives?
